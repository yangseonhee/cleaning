<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주간 위생 및 청소 점검표 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Nanum+Brush+Script&display=swap');
        
        :root {
            --primary: #1e40af;
            --primary-light: #eff6ff;
            --success: #059669;
        }

        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #f1f5f9; 
            color: #334155;
            -webkit-print-color-adjust: exact;
        }
        
        .font-hand { font-family: 'Nanum Brush Script', cursive; font-size: 1.6rem; }
        
        .grid-container {
            display: grid;
            grid-template-columns: 50px minmax(200px, 1fr) repeat(5, 70px) 180px;
            background: #fff;
        }
        .grid-header {
            background-color: #f8fafc;
            font-weight: 700;
            color: #475569;
            position: sticky;
            top: 0;
            z-index: 20;
            border-bottom: 2px solid #e2e8f0;
        }
        .grid-cell {
            border: 0.5px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 4px;
            font-size: 0.875rem;
            min-height: 3.5rem;
        }
        .clickable-cell {
            cursor: pointer;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .clickable-cell:hover { background-color: var(--primary-light); }
        .status-ok { color: #2563eb; }
        .status-bad { color: #dc2626; font-weight: bold; }

        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-page { page-break-after: always; width: 190mm; margin: 0 auto; }
            table { width: 100%; border-collapse: collapse; border: 1.5px solid #000; margin-bottom: 10px; }
            th, td { border: 1px solid #000; padding: 4px; font-size: 9pt; text-align: center; height: 8mm; }
            .col-task { text-align: left !important; padding-left: 8px !important; }
            .print-title { font-size: 22pt; font-weight: bold; text-align: center; margin-bottom: 20px; }
            .font-hand-print { font-family: 'Nanum Brush Script', cursive; font-size: 14pt !important; color: #000; }
        }
    </style>
</head>
<body class="antialiased">

    <div id="loadingOverlay">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-slate-600 font-medium">프로그램을 준비 중입니다...</p>
    </div>

    <div class="max-w-6xl mx-auto my-4 lg:my-8 px-4 no-print">
        <div class="bg-white shadow-2xl rounded-3xl overflow-hidden border border-slate-200">
            <header class="bg-slate-900 text-white p-6">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div>
                        <div class="flex items-center gap-3">
                            <h1 class="text-2xl font-bold tracking-tight" id="displaySchool">순천부영초등학교</h1>
                            <span id="syncBadge" class="bg-emerald-500 text-[10px] px-2 py-0.5 rounded-full uppercase tracking-widest font-bold">Local Save Mode</span>
                        </div>
                        <p class="text-slate-400 text-sm mt-1">주간 위생 및 청소 통합 관리 시스템</p>
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <button onclick="window.sync(true)" class="flex-1 md:flex-none bg-emerald-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg hover:bg-emerald-500 transition-all">
                            저장하기
                        </button>
                        <button onclick="window.print()" class="flex-1 md:flex-none bg-white text-slate-900 px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg hover:bg-slate-100 transition-all">
                            인쇄하기
                        </button>
                        <button onclick="toggleSettings()" class="bg-slate-800 p-2.5 rounded-xl hover:bg-slate-700">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </button>
                    </div>
                </div>
                
                <div class="mt-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">점검 기준일 선택</label>
                        <input type="date" id="weekPicker" onchange="changeWeek()" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="space-y-1 lg:col-span-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">빠른 요일 체크</label>
                        <div class="flex gap-1">
                            <button onclick="checkAllDay(0)" class="w-10 h-10 bg-slate-700 rounded-lg text-xs font-bold hover:bg-blue-600 transition-colors">월</button>
                            <button onclick="checkAllDay(1)" class="w-10 h-10 bg-slate-700 rounded-lg text-xs font-bold hover:bg-blue-600 transition-colors">화</button>
                            <button onclick="checkAllDay(2)" class="w-10 h-10 bg-slate-700 rounded-lg text-xs font-bold hover:bg-blue-600 transition-colors">수</button>
                            <button onclick="checkAllDay(3)" class="w-10 h-10 bg-slate-700 rounded-lg text-xs font-bold hover:bg-blue-600 transition-colors">목</button>
                            <button onclick="checkAllDay(4)" class="w-10 h-10 bg-slate-700 rounded-lg text-xs font-bold hover:bg-blue-600 transition-colors">금</button>
                            <div class="w-px bg-slate-700 mx-2"></div>
                            <button onclick="resetWeekData()" class="px-3 py-2 bg-red-900/40 text-red-200 rounded-lg text-xs font-bold hover:bg-red-800 transition-colors">초기화</button>
                        </div>
                    </div>
                    <div class="flex flex-col justify-end text-right">
                        <p id="weekRangeDisplay" class="text-sm font-bold text-blue-400 mb-1"></p>
                    </div>
                </div>
            </header>

            <nav class="flex bg-slate-50 border-b">
                <button onclick="showTab('hygiene')" id="btn-hygiene" class="flex-1 py-4 text-sm font-bold border-b-4 border-blue-600 text-blue-600 bg-white">위생 점검</button>
                <button onclick="showTab('cleaning')" id="btn-cleaning" class="flex-1 py-4 text-sm font-bold border-b-4 border-transparent text-slate-400">청소 점검</button>
            </nav>

            <div class="relative min-h-[400px]">
                <div id="hygiene" class="tab-content overflow-x-auto">
                    <div class="grid-container min-w-[800px]" id="hygieneGrid"></div>
                </div>
                <div id="cleaning" class="tab-content hidden overflow-x-auto text-center py-20 text-slate-400 text-sm">청소 점검 항목을 준비 중입니다.</div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-sm p-8 shadow-2xl">
            <h3 class="text-xl font-bold text-slate-800 mb-6">기본 정보 설정</h3>
            <div class="space-y-5">
                <div>
                    <label class="text-xs font-bold text-slate-500">기관명</label>
                    <input type="text" id="schoolInput" class="w-full p-3 bg-slate-50 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500">작성자</label>
                    <input type="text" id="cookInput" class="w-full p-3 bg-slate-50 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500">확인자</label>
                    <input type="text" id="approverInput" class="w-full p-3 bg-slate-50 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <button onclick="saveSettings()" class="w-full mt-8 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all">설정 저장</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 transition-all z-[100] pointer-events-none text-sm"></div>

    <div class="hidden print-only" id="printLayout">
        <div class="print-page">
            <div class="print-title">주간 위생 점검표</div>
            <div class="flex justify-between mb-2 font-bold text-sm">
                <div>기관명: <span class="p-school underline"></span></div>
                <div>점검기간: <span class="p-range underline"></span></div>
            </div>
            <table>
                <thead>
                    <tr style="background:#f1f5f9;">
                        <th width="35">No</th><th>점검사항</th><th width="45">월</th><th width="45">화</th><th width="45">수</th><th width="45">목</th><th width="45">금</th><th width="150">비고</th>
                    </tr>
                </thead>
                <tbody id="pBodyHygiene"></tbody>
            </table>
            <div class="flex justify-end gap-12 mt-6 font-bold">
                <span>작성자: <span class="p-cook underline px-4"></span> (인)</span>
                <span>확인자: <span class="p-approver underline px-4"></span> (인)</span>
            </div>
        </div>
    </div>

    <script>
        // --- Core Logic (LocalStorage Only for GitHub Simplicity) ---
        const hTasks = [
            "건강상태(설사, 발열, 구토) 여부 확인", "손가락의 상처 및 화농성 질환 유무", "위생복, 위생모, 위생화 착용 상태",
            "손 세척 및 소독(배식 전 필수) 실시", "손톱의 청결상태 및 액세서리 착용 유무", "조리원 심리적 안도감",
            "부패/변질 식재료 사용 금지 및 신선도", "식재료 검수 시 온도의 적정성 확인", "식재료의 위생적 구분 보관(선입선출)",
            "보존식 채취 및 전용고 보관(-18℃이하)", "냉장/냉동고 적정 온도 유지 및 기록", "조리 전/후 식품의 교차오염 방지",
            "가열 조리 시 중심온도 측정(85℃이상)", "채소/과일류의 소독액 농도 준수", "배식 시 위생장갑/마스크 상시 착용",
            "작업장 내 비오염/오염구역의 철저한 구분", "방충/방서 시설(포충기 등) 정상 작동", "칼, 도마, 고무장갑 용도별 구분 사용",
            "조리기구 세척 후 완전 건조 및 살균", "먹는 물(정수기 등) 정기 수질검사 여부", "바닥 청결 및 배수구 이물질 매일 제거",
            "쓰레기통 덮개 비치 및 주변 위생 관리", "청소도구의 전용함 보관 및 건조 상태", "가스/전기 누설 및 차단 시설 안전 점검",
            "소화기 압력 정상 및 통로 확보 상태", "유통기한 경과 제품 즉시 폐기 여부"
        ];

        let state = {
            info: {
                school: localStorage.getItem('school') || "순천부영초등학교",
                cook: localStorage.getItem('cook') || "",
                approver: localStorage.getItem('approver') || "양선희"
            },
            currentWeekData: { hygiene: { checks: hTasks.map(() => Array(5).fill("")), notes: hTasks.map(() => "") } }
        };

        function getMonday(d) {
            const date = new Date(d);
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(date.setDate(diff));
            return monday.toISOString().split('T')[0];
        }

        function init() {
            const today = new Date();
            const mondayKey = getMonday(today);
            document.getElementById('weekPicker').value = mondayKey;
            loadData(mondayKey);
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function loadData(weekKey) {
            const local = localStorage.getItem(`hygiene_${weekKey}`);
            if (local) state.currentWeekData = JSON.parse(local);
            else resetData();
            render();
        }

        function resetData() {
            state.currentWeekData = { hygiene: { checks: hTasks.map(() => Array(5).fill("")), notes: hTasks.map(() => "") } };
        }

        window.render = function() {
            const container = document.getElementById('hygieneGrid');
            const data = state.currentWeekData.hygiene;
            let html = `<div class="grid-cell grid-header">No</div><div class="grid-cell grid-header">점검사항</div><div class="grid-cell grid-header">월</div><div class="grid-cell grid-header">화</div><div class="grid-cell grid-header">수</div><div class="grid-cell grid-header">목</div><div class="grid-cell grid-header">금</div><div class="grid-cell grid-header">비고</div>`;
            hTasks.forEach((task, i) => {
                html += `<div class="grid-cell bg-slate-50 font-bold text-slate-400">${i+1}</div><div class="grid-cell justify-start px-4 text-slate-700 font-medium">${task}</div>`;
                for(let d=0; d<5; d++) {
                    const val = data.checks[i][d] || "";
                    const cls = val === '양호' ? 'status-ok' : (val === '미흡' ? 'status-bad' : '');
                    html += `<div class="grid-cell p-0"><div class="clickable-cell font-hand ${cls}" onclick="window.cycleCell(${i}, ${d})">${val}</div></div>`;
                }
                html += `<div class="grid-cell p-1"><input type="text" value="${data.notes[i] || ''}" onchange="window.updateNote(${i}, this.value)" class="w-full h-full bg-slate-50/50 rounded-lg px-2 text-xs outline-none focus:bg-white border border-transparent"></div>`;
            });
            container.innerHTML = html;
            
            // Print Rendering
            let pBody = "";
            hTasks.forEach((task, i) => {
                pBody += `<tr><td>${i+1}</td><td class="col-task">${task}</td>`;
                for(let d=0; d<5; d++) pBody += `<td class="font-hand-print">${data.checks[i][d] || ""}</td>`;
                pBody += `<td>${data.notes[i] || ""}</td></tr>`;
            });
            document.getElementById('pBodyHygiene').innerHTML = pBody;
            updateDisplay();
        };

        window.cycleCell = (row, col) => {
            const cur = state.currentWeekData.hygiene.checks[row][col];
            state.currentWeekData.hygiene.checks[row][col] = cur === "" ? "양호" : (cur === "양호" ? "미흡" : "");
            sync(false); render();
        };

        window.updateNote = (row, val) => {
            state.currentWeekData.hygiene.notes[row] = val;
            sync(false);
        };

        window.sync = (showMsg) => {
            const weekKey = document.getElementById('weekPicker').value;
            localStorage.setItem(`hygiene_${weekKey}`, JSON.stringify(state.currentWeekData));
            if(showMsg) showToast("브라우저에 저장되었습니다.");
        };

        window.checkAllDay = (col) => {
            const data = state.currentWeekData.hygiene.checks;
            const isAllOk = data.every(row => row[col] === "양호");
            data.forEach(row => row[col] = isAllOk ? "" : "양호");
            sync(false); render();
        };

        window.resetWeekData = () => { if(confirm("초기화하시겠습니까?")) { resetData(); sync(true); render(); } };

        window.changeWeek = () => {
            const picker = document.getElementById('weekPicker');
            const mondayKey = getMonday(picker.value);
            picker.value = mondayKey;
            loadData(mondayKey);
        };

        function updateDisplay() {
            const info = state.info;
            document.getElementById('displaySchool').innerText = info.school;
            document.getElementById('schoolInput').value = info.school;
            document.getElementById('cookInput').value = info.cook;
            document.getElementById('approverInput').value = info.approver;
            document.querySelectorAll('.p-school').forEach(el => el.innerText = info.school);
            document.querySelectorAll('.p-cook').forEach(el => el.innerText = info.cook || "(미작성)");
            document.querySelectorAll('.p-approver').forEach(el => el.innerText = info.approver);
            const monStr = document.getElementById('weekPicker').value;
            const mon = new Date(monStr);
            const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
            const range = `${mon.getFullYear()}.${mon.getMonth()+1}.${mon.getDate()} ~ ${fri.getFullYear()}.${fri.getMonth()+1}.${fri.getDate()}`;
            document.getElementById('weekRangeDisplay').innerText = range;
        }

        window.toggleSettings = () => document.getElementById('settingsModal').classList.toggle('hidden');
        window.saveSettings = () => {
            state.info = { school: document.getElementById('schoolInput').value, cook: document.getElementById('cookInput').value, approver: document.getElementById('approverInput').value };
            localStorage.setItem('school', state.info.school);
            localStorage.setItem('cook', state.info.cook);
            localStorage.setItem('approver', state.info.approver);
            updateDisplay(); toggleSettings(); showToast("저장되었습니다.");
        };

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
